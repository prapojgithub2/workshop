<!DOCTYPE html>
<html lang="th"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drop Table — Workshop Activity</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',sans-serif;padding:36px 20px}
.page-header{text-align:center;margin-bottom:40px}
.page-title{font-size:26px;font-weight:800;color:#f8fafc;margin-bottom:8px}
.page-sub{color:#64748b;font-size:13px}
.cards-row{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;max-width:620px;margin:0 auto}
.qr-card{background:#1e293b;border-radius:16px;padding:24px 16px;text-align:center;border:1px solid #334155}
.role-badge{display:inline-block;padding:7px 24px;border-radius:20px;font-size:16px;font-weight:800;margin-bottom:16px}
.emp{background:#1d4ed8;color:#bfdbfe}
.emp-b{background:#0e7490;color:#cffafe}
.mgr{background:#6d28d9;color:#ddd6fe}
.qr-wrap{display:flex;justify-content:center;min-height:200px;align-items:center}
.qr-wrap img{border-radius:8px;border:4px solid #fff}
.back{display:block;text-align:center;margin-top:28px;color:#475569;font-size:12px;text-decoration:none}
</style></head><body>

<div class="page-header">
  <div class="page-title">🗑️ The Accidental Drop Table</div>
  <div class="page-sub">สแกน QR Code เพื่อดูบทบาทของคุณ</div>
</div>

<div class="cards-row">

  <div class="qr-card">
    <div class="role-badge emp">Employee A</div>
    <div class="qr-wrap">
      <img class="qr-img" data-path="card/emp-a.html" src="" width="200" height="200" alt="QR">
    </div>
  </div>

  <div class="qr-card">
    <div class="role-badge mgr">Manager A</div>
    <div class="qr-wrap">
      <img class="qr-img" data-path="card/mgr-a.html" src="" width="200" height="200" alt="QR">
    </div>
  </div>

  <div class="qr-card">
    <div class="role-badge emp-b">Employee B</div>
    <div class="qr-wrap">
      <img class="qr-img" data-path="card/emp-b.html" src="" width="200" height="200" alt="QR">
    </div>
  </div>

  <div class="qr-card">
    <div class="role-badge mgr">Manager B</div>
    <div class="qr-wrap">
      <img class="qr-img" data-path="card/mgr-b.html" src="" width="200" height="200" alt="QR">
    </div>
  </div>

</div>

<a class="back" href="index.html">← กลับหน้ารวม</a>

<script>
const base = window.location.href.replace(/drop-table\.html$/, '').replace(/\/$/, '') + '/';
document.querySelectorAll('.qr-img').forEach(img => {
  const full = encodeURIComponent(base + img.dataset.path);
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&color=0f172a&bgcolor=ffffff&data=' + full;
});
</script>
</body></html>
